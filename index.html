function getAudio(){if(!audioCtx){try{audioCtx=new AudioCtx();}catch(e){}}return audioCtx;}
function playTone(freq,dur,type='sine',vol=0.3){
  const ctx=getAudio();if(!ctx)return;
  try{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type=type;o.frequency.setValueAtTime(freq,ctx.currentTime);
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start();o.stop(ctx.currentTime+dur);
  }catch(e){}
}

const TOPICS=Object.keys(ALL);
let topic=TOPICS[0],questions=[],cur=0,score=0,coins=0,answered=false,userInput="",finished=false;
let streak=0,maxStreak=0,results=[];
let studentName="",groupName="";
let allResults=JSON.parse(localStorage.getItem("quiz_results")||"[]");
let leaderboard=JSON.parse(localStorage.getItem("quiz_lb")||"[]");

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function validateName(val){
  if(!val||val.trim().length<3)return"Ism kamida 3 ta harf bo'lishi kerak";
  if(/^[a-zA-Z0-9]{1,2}$/.test(val.trim()))return"To'liq ism yozing (masalan: Alibek Karimov)";
  if(!/\s/.test(val.trim())&&val.trim().length<5)return"Ism va familiyangizni yozing";
  if(/^\d+$/.test(val.trim()))return"Raqam emas, ism yozing";
  return null;
}

function validateGroup(val){
  if(!val||val.trim().length<1)return"Guruh nomini kiriting";
  return null;
}

/* ---------- NAME SCREEN ---------- */
function showNameScreen(){
  document.getElementById("tabs").innerHTML="";
  document.getElementById("main-card").innerHTML=`
    <div class="name-screen">
      <div style="font-size:52px;margin-bottom:8px">📝</div>
      <h2>Testni boshlash</h2>
      <p>Ism va guruhingizni to'g'ri kiriting</p>

      <label class="input-label">👤 To'liq ism (Ism Familiya):</label>
      <input class="name-input" id="name-inp" type="text" placeholder="Masalan: Alibek Karimov" autocomplete="off" oninput="validateNameLive()" onkeydown="if(event.key==='Enter')document.getElementById('group-inp').focus()"/>
      <div class="error-msg" id="name-err"></div>

      <label class="input-label">🏫 Guruh nomi:</label>
      <input class="name-input" id="group-inp" type="text" placeholder="Masalan: 7-A, Intermediate-1" autocomplete="off" oninput="validateGroupLive()" onkeydown="if(event.key==='Enter')beginQuiz()"/>
      <div class="error-msg" id="group-err"></div>

      <div style="margin-bottom:16px;text-align:left">
        <label class="input-label">📚 Mavzuni tanlang:</label>
        <div class="topic-pick" id="topic-pick">
          ${TOPICS.map((t,i)=>`<label class="topic-radio${i===0?' selected':''}" id="tr${i}" onclick="selectTopic('${t}',${i})">
            <input type="radio" name="tp" value="${t}" ${i===0?'checked':''}> ${t}
          </label>`).join("")}
        </div>
      </div>
      <button class="start-btn" onclick="beginQuiz()">🚀 Testni boshlash</button>
      <div style="margin-top:1.5rem">${renderLBMini()}</div>
    </div>`;
  setTimeout(()=>{const e=document.getElementById("name-inp");if(e)e.focus();},100);
}

function validateNameLive(){
  const val=document.getElementById("name-inp").value;
  const err=validateName(val);
  const errEl=document.getElementById("name-err");
  const inp=document.getElementById("name-inp");
  if(err){errEl.textContent=err;inp.classList.add("error");}
  else{errEl.textContent="";inp.classList.remove("error");}
}
function validateGroupLive(){
  const val=document.getElementById("group-inp").value;
  const err=validateGroup(val);
  const errEl=document.getElementById("group-err");
  const inp=document.getElementById("group-inp");
  if(err){errEl.textContent=err;inp.classList.add("error");}
  else{errEl.textContent="";inp.classList.remove("error");}
}

function selectTopic(t,idx){
  topic=t;soundClick();
  document.querySelectorAll(".topic-radio").forEach((el,i)=>el.classList.toggle("selected",i===idx));
}

function renderLBMini(){
  if(leaderboard.length===0)return"";
  const sorted=[...leaderboard].sort((a,b)=>b.coins-a.coins).slice(0,3);
  const medals=["🥇","🥈","🥉"];
  const cls=["gold","silver","bronze"];
  let html=`<div class="lb-title">🏆 Top O'quvchilar</div>`;
  sorted.forEach((s,i)=>{
    html+=`<div class="lb-row ${cls[i]}">
      <span class="lb-rank">${medals[i]}</span>
      <span class="lb-name">${s.name} <span class="lb-group">${s.group||""}</span></span>
      <span class="lb-score">🪙 ${s.coins}</span>
    </div>`;
  });
  return html;
}

function beginQuiz(){
  const nVal=document.getElementById("name-inp").value;
  const gVal=document.getElementById("group-inp").value;
  const nErr=validateName(nVal);
  const gErr=validateGroup(gVal);
  if(nErr){
    document.getElementById("name-err").textContent=nErr;
    document.getElementById("name-inp").classList.add("error");
    document.getElementById("name-inp").focus();return;
  }
  if(gErr){
    document.getElementById("group-err").textContent=gErr;
    document.getElementById("group-inp").classList.add("error");
    document.getElementById("group-inp").focus();return;
  }
  studentName=nVal.trim();
  groupName=gVal.trim();
  const pool=ALL[topic];
  questions=shuffle(pool).slice(0,Math.min(20,pool.length));
  cur=0;score=0;coins=0;answered=false;userInput="";finished=false;streak=0;maxStreak=0;results=[];
  soundStart();
  rebuildCard();render();
}

function rebuildCard(){
  document.getElementById("main-card").innerHTML=`
    <div id="streak-bar" class="streak-bar">
      <div class="streak-flames" id="flames"></div>
      <span class="streak-text" id="streak-txt">Ketma-ket to'g'ri javob bering! 🎯</span>
    </div>
    <div class="stats-row">
      <div class="stat-box coins"><div class="stat-num" id="stat-coins">0</div><div class="stat-label">🪙 Ball</div></div>
      <div class="stat-box correct"><div class="stat-num" id="stat-ok">0</div><div class="stat-label">✅ To'g'ri</div></div>
      <div class="stat-box wrong"><div class="stat-num" id="stat-err">0</div><div class="stat-label">❌ Xato</div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-top"><span id="prog-label">1 / ${questions.length}</span><span id="prog-pct">0%</span></div>
      <div class="progress-track"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    </div>
    <div id="quiz-area"></div>`;
  renderTabs();updateStreak();
}

function renderTabs(){
  document.getElementById("tabs").innerHTML=TOPICS.map(t=>
    `<div class="tab${t===topic?' active':''}">${t}</div>`
  ).join("");
}

function updateStats(){
  const ok=results.filter(r=>r.isOk).length;
  const err=results.filter(r=>!r.isOk).length;
  const e1=document.getElementById("stat-coins");if(e1)e1.textContent=coins;
  const e2=document.getElementById("stat-ok");if(e2)e2.textContent=ok;
  const e3=document.getElementById("stat-err");if(e3)e3.textContent=err;
}

function updateStreak(){
  const el=document.getElementById("flames");
  const txt=document.getElementById("streak-txt");
  if(!el||!txt)return;
  let html="";
  for(let i=0;i<5;i++)html+=`<span class="flame">${i<streak?'🔥':'⬜'}</span>`;
  el.innerHTML=html;
  if(streak===0)txt.textContent="Ketma-ket to'g'ri javob bering! 🎯";
  else if(streak<5)txt.textContent=`${streak} ta ketma-ket! ${5-streak} ta qoldi 🔥`;
  else txt.textContent=`🔥 ${streak} ta ketma-ket! Zo'r!`;
}

function updateProgress(){
  const pct=finished?100:Math.round((cur/questions.length)*100);
  const pf=document.getElementById("progress");if(pf)pf.style.width=pct+"%";
  const pl=document.getElementById("prog-label");if(pl)pl.textContent=(finished?"Tugadi":(cur+1))+" / "+questions.length;
  const pp=document.getElementById("prog-pct");if(pp)pp.textContent=pct+"%";
}

function render(){
  updateProgress();
  if(finished){renderScore();return;}
  const q=questions[cur];answered=false;userInput="";
  const badge=q.type==="mc"?'<span class="q-badge badge-mc">🔤 Test</span>':'<span class="q-badge badge-fill">✏️ To\'ldiring</span>';
  let body="";
  if(q.type==="mc"){
    body=`<div class="options">`+q.opts.map((o,i)=>
      `<button class="opt-btn" id="o${i}" onclick="checkMC(${i})">
        <span class="opt-letter">${["A","B","C","D"][i]}</span>${o}
      </button>`
    ).join("")+`</div>`;
  }else{
    body=`<input class="fill-input" id="fi" type="text" placeholder="Javobingizni yozing..." oninput="userInput=this.value" onkeydown="if(event.key==='Enter')checkFill()" autocomplete="off"/>
    <button class="check-btn" onclick="checkFill()">✓ Tekshirish</button>`;
  }
  document.getElementById("quiz-area").innerHTML=`
    <div class="q-meta"><span class="q-num">Savol ${cur+1}</span>${badge}</div>
    <div class="q-text">${q.q}</div>
    <div id="qb">${body}</div>
    <div id="fb"></div>
    <div class="nav-row">
      <button class="next-btn" id="next-btn" onclick="next()" disabled>${cur===questions.length-1?"🏁 Tugat":"Keyingi →"}</button>
    </div>`;
  if(q.type!=="mc")setTimeout(()=>{const e=document.getElementById("fi");if(e)e.focus();},50);
}

function enableNext(){const nb=document.getElementById("next-btn");if(nb){nb.disabled=false;}}

function checkMC(i){
  if(answered)return;answered=true;
  const q=questions[cur],c=q.ans;
  document.querySelectorAll(".opt-btn").forEach((b,idx)=>{
    b.disabled=true;
    if(idx===c)b.classList.add("correct");
    else if(idx===i&&i!==c)b.classList.add("wrong");
  });
  processAnswer(i===c,q.opts[c],q.opts[i]||"");
}

function checkFill(){
  if(answered)return;answered=true;
  const q=questions[cur];
  const val=userInput.trim().toLowerCase();
  const ok=val===q.ans.toLowerCase();
  const el=document.getElementById("fi");
  if(el){el.disabled=true;el.classList.add(ok?"correct":"wrong");}
  processAnswer(ok,q.ans,userInput.trim()||"(bo'sh)");
}

function processAnswer(ok,correct,userAns){
  results.push({q:questions[cur].q,correct,userAns,isOk:ok});
  if(ok){
    score++;streak++;if(streak>maxStreak)maxStreak=streak;
    coins+=COIN_PER_CORRECT;
    soundCorrect();
    if(streak%5===0){coins+=STREAK_BONUS;showStreakPopup(streak);}
  }else{
    streak=0;soundWrong();
  }
  updateStreak();updateStats();
  showFB(ok,correct);enableNext();
}

function showFB(ok,correct){
  const fb=document.getElementById("fb");
  if(fb)fb.innerHTML=ok
    ?`<div class="feedback ok">🎉 To'g'ri! +${COIN_PER_CORRECT} 🪙</div>`
    :`<div class="feedback err">❌ Noto'g'ri. To'g'ri javob: <strong>${correct}</strong></div>`;
}

function showStreakPopup(n){
  soundStreak();
  const div=document.createElement("div");
  div.className="streak-popup";
  div.innerHTML=`<h2>🔥 ${n} KETMA-KET!</h2><p>Ajoyib! +${STREAK_BONUS} 🪙 bonus!</p>`;
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),2600);
  confetti();
}

function confetti(){
  const colors=["#f093fb","#f5576c","#4facfe","#43e97b","#ffd700","#764ba2"];
  const cel=document.createElement("div");cel.className="celebrate";
  for(let i=0;i<60;i++){
    const p=document.createElement("div");p.className="confetti-piece";
    p.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;border-radius:${Math.random()>0.5?'50%':'2px'}`;
    cel.appendChild(p);
  }
  document.body.appendChild(cel);setTimeout(()=>cel.remove(),3000);
}

function next(){
  if(!answered){
    const q=questions[cur];
    if(q.type==="mc"){
      document.querySelectorAll(".opt-btn").forEach((b,i)=>{b.disabled=true;if(i===q.ans)b.classList.add("correct");});
      processAnswer(false,q.opts[q.ans],"(javob berilmadi)");
    }else{
      const el=document.getElementById("fi");if(el){el.disabled=true;el.classList.add("wrong");}
      processAnswer(false,q.ans,"(javob berilmadi)");
    }
    setTimeout(()=>advance(),600);
  }else{advance();}
}
function advance(){if(cur<questions.length-1){cur++;render();}else{finished=true;render();}}

async function sendToTelegram(msg){
  try{
    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({chat_id:CHAT_ID,text:msg,parse_mode:"HTML"})
    });
  }catch(e){}
}

function saveData(){
  const pct=Math.round(score/questions.length*100);
  const now=new Date();
  const record={name:studentName,group:groupName,topic,score,total:questions.length,pct,coins,maxStreak,time:now.toISOString(),wrongs:results.filter(r=>!r.isOk)};
  allResults.unshift(record);
  if(allResults.length>200)allResults=allResults.slice(0,200);
  try{localStorage.setItem("quiz_results",JSON.stringify(allResults));}catch(e){}

  // Leaderboard update
  const key=studentName.toLowerCase()+"_"+groupName.toLowerCase();
  const idx=leaderboard.findIndex(l=>(l.name.toLowerCase()+"_"+(l.group||"").toLowerCase())===key);
  if(idx>=0){if(coins>leaderboard[idx].coins)leaderboard[idx].coins=coins;}
  else leaderboard.push({name:studentName,group:groupName,coins});
  leaderboard.sort((a,b)=>b.coins-a.coins);
  try{localStorage.setItem("quiz_lb",JSON.stringify(leaderboard));}catch(e){}
}

function renderScore(){
  const pct=Math.round(score/questions.length*100);
  const emoji=pct>=90?"🏆":pct>=70?"🥇":pct>=50?"👍":"📚";
  const msg=pct>=90?"Mukammal!":pct>=70?"Ajoyib!":pct>=50?"Yaxshi, davom eting!":"Ko'proq o'qish kerak!";
  saveData();
  if(pct>=80)confetti();

  const wrongs=results.filter(r=>!r.isOk);
  let wrongRows=wrongs.map((r,i)=>`<tr class="err-row"><td>${i+1}</td><td>${r.q}</td><td style="color:#991b1b">${r.userAns}</td><td style="color:#166534">${r.correct}</td></tr>`).join("");
  let tableHtml=wrongs.length===0
    ?`<p style="color:#166534;font-size:14px;font-weight:700;margin-top:1rem">🌟 Barcha savollar to'g'ri!</p>`
    :`<div class="wrong-title">❌ Xato javoblar:</div><table class="detail-table"><thead><tr><th>#</th><th>Savol</th><th>Javob</th><th>To'g'ri</th></tr></thead><tbody>${wrongRows}</tbody></table>`;

  document.getElementById("quiz-area").innerHTML=`
    <div class="score-box">
      <div class="score-trophy">${emoji}</div>
      <div class="score-big">${score}/${questions.length}</div>
      <div class="score-msg">${msg} — ${pct}%</div>
      <div class="score-pills">
        <span class="pill pill-ok">✅ To'g'ri: ${score}</span>
        <span class="pill pill-err">❌ Xato: ${questions.length-score}</span>
        <span class="pill pill-coin">🪙 Ball: ${coins}</span>
        ${maxStreak>=5?`<span class="pill" style="background:#fff0fe;color:#a21caf;border:2px solid #e879f9">🔥 Streak: ${maxStreak}</span>`:""}
      </div>
      <div id="tg-status" class="tg-status">📤 Natija o'qituvchiga yuborilmoqda...</div>
      <div class="divider"></div>
      ${tableHtml}
      <div class="divider"></div>
      <div style="margin-bottom:1rem">${renderLBMini()}</div>
      <button class="restart-btn" onclick="showNameScreen()">🔄 Yangi test</button>
    </div>`;

  const now=new Date();
  const time=now.toLocaleString("uz-UZ",{hour:"2-digit",minute:"2-digit",day:"2-digit",month:"2-digit",year:"numeric"});
  let tgMsg=`📝 <b>Yangi test natijasi</b>\n\n`;
  tgMsg+=`👤 <b>O'quvchi:</b> ${studentName}\n`;
  tgMsg+=`🏫 <b>Guruh:</b> ${groupName}\n`;
  tgMsg+=`📚 <b>Mavzu:</b> ${topic}\n`;
  tgMsg+=`🕐 <b>Vaqt:</b> ${time}\n`;
  tgMsg+=`📊 <b>Natija:</b> ${score}/${questions.length} (${pct}%)\n`;
  tgMsg+=`✅ <b>To'g'ri:</b> ${score}  ❌ <b>Xato:</b> ${questions.length-score}\n`;
  tgMsg+=`🪙 <b>Ball:</b> ${coins}  🔥 <b>Max streak:</b> ${maxStreak}\n`;
  if(wrongs.length>0){
    tgMsg+=`\n❌ <b>Xato javoblar:</b>\n`;
    wrongs.forEach((r,i)=>{tgMsg+=`${i+1}. ${r.q}\n   ↳ <i>${r.userAns}</i> → <b>${r.correct}</b>\n`;});
  }else tgMsg+=`\n🌟 Barcha savollar to'g'ri!`;

  sendToTelegram(tgMsg).then(()=>{
    const el=document.getElementById("tg-status");
    if(el)el.innerHTML=`<span style="color:#166534;font-weight:800">✅ Natija o'qituvchiga yuborildi!</span>`;
  }).catch(()=>{
    const el=document.getElementById("tg-status");
    if(el)el.innerHTML=`<span style="color:#991b1b">⚠️ Yuborishda xatolik</span>`;
  });
}

}
function closePanel(){document.getElementById("panel-overlay").classList.remove("open");}

function renderPanel(filterGroup="all"){
  const filtered=filterGroup==="all"?allResults:allResults.filter(r=>r.group===filterGroup);
  const groups=[...new Set(allResults.map(r=>r.group))];
  const totalStudents=new Set(allResults.map(r=>r.name+"_"+r.group)).size;
  const avgPct=allResults.length?Math.round(allResults.reduce((a,r)=>a+r.pct,0)/allResults.length):0;
  const totalCoins=allResults.reduce((a,r)=>a+r.coins,0);

  // Group activity
  const groupStats={};
  allResults.forEach(r=>{
    if(!groupStats[r.group])groupStats[r.group]={count:0,totalPct:0};
    groupStats[r.group].count++;
    groupStats[r.group].totalPct+=r.pct;
  });
  const mostActive=Object.entries(groupStats).sort((a,b)=>b[1].count-a[1].count)[0];

  const medals=["🥇","🥈","🥉"];
  const cls=["gold","silver","bronze"];

  document.getElementById("panel-box").innerHTML=`
    <div class="panel-header">
      <h2>👩‍🏫 O'qituvchi Paneli</h2>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div class="panel-stats">
      <div class="ps-box a"><div class="ps-num">${totalStudents}</div><div class="ps-lbl">O'quvchilar</div></div>
      <div class="ps-box b"><div class="ps-num">${allResults.length}</div><div class="ps-lbl">Testlar</div></div>
      <div class="ps-box c"><div class="ps-num">${avgPct}%</div><div class="ps-lbl">O'rtacha</div></div>
      <div class="ps-box d"><div class="ps-num">${mostActive?mostActive[0]:"-"}</div><div class="ps-lbl">Faol guruh</div></div>
    </div>

    <div style="margin-bottom:1rem">
      <div style="font-size:13px;font-weight:800;color:#555;margin-bottom:8px">🏫 Guruh bo'yicha filtrlash:</div>
      <div class="group-filter">
        <button class="gf-btn${filterGroup==="all"?" active":""}" onclick="renderPanel('all')">Hammasi</button>
        ${groups.map(g=>`<button class="gf-btn${filterGroup===g?" active":""}" onclick="renderPanel('${g}')">${g}</button>`).join("")}
      </div>
    </div>

    <div style="font-size:14px;font-weight:800;color:#555;margin-bottom:10px">📋 Natijalar (${filtered.length} ta)</div>
    ${filtered.length===0?`<p style="color:#888;font-size:14px;text-align:center;padding:2rem">Hali natija yo'q</p>`:`
    <div style="overflow-x:auto">
    <table class="panel-table">
      <thead><tr><th>#</th><th>O'quvchi</th><th>Guruh</th><th>Mavzu</th><th>Natija</th><th>Ball</th><th>Vaqt</th></tr></thead>
      <tbody>
        ${filtered.map((r,i)=>{
          const pctClass=r.pct>=80?"bs-high":r.pct>=50?"bs-mid":"bs-low";
          const d=new Date(r.time);
          const t=d.toLocaleString("uz-UZ",{hour:"2-digit",minute:"2-digit",day:"2-digit",month:"2-digit"});
          return`<tr>
            <td>${i<3?medals[i]:i+1}</td>
            <td><b>${r.name}</b></td>
            <td>${r.group}</td>
            <td>${r.topic}</td>
            <td><span class="badge-score ${pctClass}">${r.score}/${r.total} (${r.pct}%)</span></td>
            <td>🪙${r.coins}</td>
            <td style="color:#aaa;font-size:12px">${t}</td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>
    </div>`}

    <div style="margin-top:1.5rem;display:flex;justify-content:flex-end">
      <button class="clear-btn" onclick="clearData()">🗑️ Barcha natijalarni o'chirish</button>
    </div>`;
}

function clearData(){
  const pwd=prompt("Tasdiqlash uchun parolni kiriting:");
  if(pwd!==TEACHER_PASSWORD){
    if(pwd!==null)alert("Noto'g'ri parol!");
    return;
  }
  if(!confirm("Barcha natijalarni o'chirmoqchimisiz? Bu amalni qaytarib bo'lmaydi."))return;
  allResults=[];leaderboard=[];
  try{localStorage.removeItem("quiz_results");localStorage.removeItem("quiz_lb");}catch(e){}
  renderPanel();
}

showNameScreen();
</script>
</body>
</html>
